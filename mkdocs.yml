site_name: QA Knowledge - 他社QA事例・ナレッジ集
site_description: テック企業のQA事例・ナレッジを構造化して収集するリポジトリ
repo_name: qa-knowledge

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang: ja
  - tags:
      tags_file: indexes/by-tag.md

nav:
  - ホーム: index.md
  - エントリ一覧:
      - 会社別: indexes/by-company.md
      - QA領域別: indexes/by-domain.md
      - タグ別: indexes/by-tag.md
      - 追加日順: indexes/by-date.md
  - スキーマ定義: docs/schema.md
