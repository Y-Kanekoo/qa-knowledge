name: インデックス自動生成

on:
  push:
    branches: [main]
    paths:
      - "entries/**/*.md"

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 依存パッケージのインストール
        run: pip install python-frontmatter pyyaml
      - name: インデックスを生成
        run: python scripts/generate_index.py
      - name: 変更を自動コミット
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[chore] インデックスを自動更新する"
          file_pattern: "index.md indexes/**"
      - name: 失敗時にIssueで通知
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[CI失敗] ${{ github.workflow }}" \
            --body "ブランチ: ${{ github.ref_name }}\nコミット: ${{ github.sha }}\n実行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "ci-failure"
