name: コード品質チェック

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt pytest-cov
      - name: Ruff によるコード品質チェック
        run: ruff check .
      - name: Pytest によるテスト実行
        run: pytest -v --tb=short --cov=scripts --cov-report=term-missing
