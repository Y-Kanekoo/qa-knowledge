name: フロントマター検証

on:
  push:
    paths:
      - "entries/**/*.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 依存パッケージのインストール
        run: pip install python-frontmatter pyyaml
      - name: フロントマター検証を実行
        run: python scripts/validate_frontmatter.py
      - name: 失敗時にIssueで通知
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[CI失敗] ${{ github.workflow }}" \
            --body "ブランチ: ${{ github.ref_name }}\nコミット: ${{ github.sha }}\n実行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "ci-failure"
