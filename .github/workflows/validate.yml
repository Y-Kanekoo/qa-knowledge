name: フロントマター検証

on:
  push:
    paths:
      - "entries/**/*.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 依存パッケージのインストール
        run: pip install python-frontmatter pyyaml
      - name: フロントマター検証を実行
        run: python scripts/validate_frontmatter.py
